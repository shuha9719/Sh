<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>S&H — AI Стилист</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  background:linear-gradient(160deg,#04081a 0%,#080c14 40%,#060d0a 70%,#04050f 100%);
  background-attachment:fixed;
  color:#fff;
  font-family:'Inter',sans-serif;
  font-weight:300;
  min-height:100vh;
}

/* NAV */
.nav{
  position:fixed;top:16px;left:50%;transform:translateX(-50%);
  z-index:1000;width:calc(100% - 32px);max-width:600px;
  display:flex;align-items:center;justify-content:space-between;
  padding:13px 24px;border-radius:100px;
  background:rgba(0,0,0,0.3);
  backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.15);
  box-shadow:0 8px 32px rgba(0,0,0,0.4);
}
.nav-logo{
  font-family:'Unbounded',sans-serif;font-size:13px;font-weight:800;
  background:linear-gradient(90deg,#ff6ec4,#a78bfa,#60a5fa);
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
  text-decoration:none;
}
.nav-back{
  font-family:'Inter',sans-serif;font-size:11px;
  color:rgba(255,255,255,0.5);text-decoration:none;
  transition:color .2s;
}
.nav-back:hover{color:#fff}

/* MAIN */
.container{
  max-width:600px;margin:0 auto;
  padding:100px 16px 40px;
}

.title{
  font-family:'Unbounded',sans-serif;
  font-size:clamp(22px,6vw,36px);
  font-weight:800;line-height:1.1;
  background:linear-gradient(90deg,#ff6ec4,#a78bfa,#60a5fa);
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
  margin-bottom:8px;
}
.subtitle{
  font-size:13px;color:rgba(255,255,255,0.4);
  margin-bottom:32px;line-height:1.5;
}

/* UPLOAD ZONE */
.upload-zone{
  border:2px dashed rgba(167,139,250,0.3);
  border-radius:20px;
  padding:40px 20px;
  text-align:center;
  cursor:pointer;
  transition:border-color .3s, background .3s;
  position:relative;
  margin-bottom:16px;
}
.upload-zone:hover{
  border-color:rgba(167,139,250,0.6);
  background:rgba(167,139,250,0.05);
}
.upload-zone.has-photo{
  border-style:solid;
  border-color:rgba(167,139,250,0.4);
  padding:0;overflow:hidden;
}
.upload-zone img.preview{
  width:100%;
  aspect-ratio:16/9;
  object-fit:cover;
  display:block;
  border-radius:18px;
}
.upload-icon{font-size:36px;margin-bottom:12px}
.upload-text{font-size:14px;color:rgba(255,255,255,0.5)}
.upload-hint{font-size:11px;color:rgba(255,255,255,0.25);margin-top:6px}
#fileInput{display:none}

/* PROMPT */
.prompt-label{
  font-size:11px;letter-spacing:0.15em;text-transform:uppercase;
  color:rgba(255,255,255,0.3);margin-bottom:8px;
}
.prompt-input{
  width:100%;background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.12);
  border-radius:14px;padding:14px 16px;
  color:#fff;font-family:'Inter',sans-serif;font-size:14px;
  resize:none;outline:none;
  transition:border-color .3s;
  margin-bottom:16px;
}
.prompt-input:focus{border-color:rgba(167,139,250,0.5)}
.prompt-input::placeholder{color:rgba(255,255,255,0.2)}

/* PRESETS */
.presets{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:24px}
.preset{
  font-size:11px;padding:6px 14px;border-radius:100px;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.1);
  color:rgba(255,255,255,0.5);cursor:pointer;
  transition:all .2s;
}
.preset:hover,.preset.active{
  background:rgba(167,139,250,0.15);
  border-color:rgba(167,139,250,0.4);
  color:#a78bfa;
}

/* BTN */
.btn-generate{
  width:100%;padding:18px;border-radius:100px;
  background:linear-gradient(90deg,#ff6ec4,#a78bfa,#60a5fa,#4ade80);
  background-size:200%;
  border:none;color:#fff;
  font-family:'Unbounded',sans-serif;font-size:11px;
  letter-spacing:0.1em;text-transform:uppercase;
  cursor:pointer;
  animation:rainbowShift 4s linear infinite;
  transition:opacity .2s,transform .2s;
  margin-bottom:24px;
}
.btn-generate:hover{opacity:0.9;transform:scale(1.01)}
.btn-generate:disabled{opacity:0.4;cursor:not-allowed;transform:none}

@keyframes rainbowShift{
  0%{background-position:0%}
  100%{background-position:200%}
}

/* RESULT */
.result-section{display:none}
.result-section.visible{display:block}
.result-label{
  font-size:11px;letter-spacing:0.15em;text-transform:uppercase;
  color:rgba(255,255,255,0.3);margin-bottom:12px;
}
.result-img-wrap{
  border-radius:20px;overflow:hidden;
  border:1px solid rgba(255,255,255,0.1);
  margin-bottom:12px;
  background:rgba(0,0,0,0.3);
}
.result-img-wrap img{
  width:100%;
  aspect-ratio:16/9;
  object-fit:cover;
  display:block;
}

.btn-download{
  width:100%;padding:16px;border-radius:100px;
  background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.15);
  color:#fff;font-size:13px;
  cursor:pointer;transition:background .2s;
  display:flex;align-items:center;justify-content:center;gap:8px;
  margin-bottom:12px;
}
.btn-download:hover{background:rgba(255,255,255,0.14)}

.btn-new{
  width:100%;padding:16px;border-radius:100px;
  background:transparent;
  border:1px solid rgba(167,139,250,0.3);
  color:rgba(167,139,250,0.8);font-size:13px;
  cursor:pointer;transition:all .2s;
}
.btn-new:hover{border-color:rgba(167,139,250,0.6);color:#a78bfa}

/* LOADING */
.loading{
  display:none;text-align:center;padding:40px 20px;
}
.loading.visible{display:block}
.spinner{
  width:48px;height:48px;border-radius:50%;
  border:3px solid rgba(167,139,250,0.2);
  border-top-color:#a78bfa;
  animation:spin 1s linear infinite;
  margin:0 auto 16px;
}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:14px;color:rgba(255,255,255,0.4)}

/* ERROR */
.error{
  display:none;background:rgba(255,80,80,0.1);
  border:1px solid rgba(255,80,80,0.3);
  border-radius:14px;padding:14px 16px;
  font-size:13px;color:#ff6b6b;
  margin-bottom:16px;
}
.error.visible{display:block}

/* TELEGRAM BTN */
.tg-btn{
  position:fixed;bottom:24px;right:24px;
  width:56px;height:56px;border-radius:50%;
  background:linear-gradient(135deg,#a78bfa,#60a5fa);
  display:flex;align-items:center;justify-content:center;
  text-decoration:none;box-shadow:0 4px 20px rgba(96,165,250,0.4);
  transition:transform .2s;z-index:100;
}
.tg-btn:hover{transform:scale(1.1)}
.tg-btn svg{width:24px;height:24px;fill:#fff}
</style>
</head>
<body>

<nav class="nav">
  <a class="nav-logo" href="/">S&H</a>
  <a class="nav-back" href="/">← На сайт</a>
</nav>

<div class="container">
  <h1 class="title">AI Стилист</h1>
  <p class="subtitle">Загрузи фото и примерь новую стрижку за секунды</p>

  <div id="mainForm">
    <!-- Upload -->
    <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()">
      <div class="upload-icon">📷</div>
      <div class="upload-text">Нажми чтобы загрузить фото</div>
      <div class="upload-hint">JPG, PNG — лучше фото анфас при хорошем освещении</div>
    </div>
    <input type="file" id="fileInput" accept="image/*">

    <!-- Prompt -->
    <div class="prompt-label">Опиши желаемую стрижку</div>
    <textarea class="prompt-input" id="promptInput" rows="3" placeholder="Например: короткая стрижка андеркат, выбритые виски, чёткая линия...">Примерь на этом человеке новую мужскую стрижку — короткие волосы сверху, выбритые виски, чёткий контур. Сохрани лицо и реализм. Горизонтальный формат 16:9.</textarea>

    <!-- Presets -->
    <div class="prompt-label">Быстрый выбор</div>
    <div class="presets">
      <div class="preset" onclick="setPreset(this, 'Андеркат — короткие волосы сверху, выбритые виски. Горизонтальный формат 16:9.')">Андеркат</div>
      <div class="preset" onclick="setPreset(this, 'Классическая стрижка — аккуратно, гладко зачёсано набок. Горизонтальный формат 16:9.')">Классика</div>
      <div class="preset" onclick="setPreset(this, 'Фейд — постепенный переход от очень короткого к длинному, чистые переходы. Горизонтальный формат 16:9.')">Фейд</div>
      <div class="preset" onclick="setPreset(this, 'Помпадур — высокий объём наверху, выбритые бока. Горизонтальный формат 16:9.')">Помпадур</div>
      <div class="preset" onclick="setPreset(this, 'Короткая бузкат стрижка — очень коротко, военный стиль. Горизонтальный формат 16:9.')">Бузкат</div>
    </div>

    <div class="error" id="errorMsg"></div>

    <button class="btn-generate" id="generateBtn" onclick="generate()">✂️ Примерить стрижку</button>
  </div>

  <!-- Loading -->
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <div class="loading-text">Создаём твой образ...</div>
  </div>

  <!-- Result -->
  <div class="result-section" id="resultSection">
    <div class="result-label">Результат</div>
    <div class="result-img-wrap">
      <img id="resultImg" src="" alt="Результат">
    </div>
    <button class="btn-download" onclick="downloadImg()">⬇️ Скачать</button>
    <button class="btn-new" onclick="resetForm()">↺ Попробовать снова</button>
  </div>
</div>

<a class="tg-btn" href="https://t.me/Shuha97_bot" target="_blank">
  <svg viewBox="0 0 24 24"><path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.562 8.248-1.97 9.289c-.145.658-.537.818-1.084.508l-3-2.21-1.447 1.394c-.16.16-.295.295-.605.295l.213-3.053 5.56-5.023c.242-.213-.054-.333-.373-.12L8.048 14.63l-2.948-.924c-.64-.203-.654-.64.135-.952l11.507-4.44c.533-.194 1.002.131.82.934z"/></svg>
</a>

<script>
const API_KEY = 'AIzaSyAb8RN6Lfe9rulOxvQHu8ydKhurmYkfqxsqWesy4_xAvI-FnUDg'; // заменить на реальный ключ
let photoBase64 = null;
let resultDataUrl = null;

// Upload
document.getElementById('fileInput').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    photoBase64 = ev.target.result.split(',')[1];
    const zone = document.getElementById('uploadZone');
    zone.classList.add('has-photo');
    zone.innerHTML = `<img class="preview" src="${ev.target.result}" alt="Фото">`;
  };
  reader.readAsDataURL(file);
});

function setPreset(el, text) {
  document.querySelectorAll('.preset').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('promptInput').value = text;
}

async function generate() {
  const prompt = document.getElementById('promptInput').value.trim();
  if (!photoBase64) {
    showError('Загрузи фото!');
    return;
  }
  if (!prompt) {
    showError('Опиши желаемую стрижку');
    return;
  }

  hideError();
  document.getElementById('mainForm').style.display = 'none';
  document.getElementById('loading').classList.add('visible');
  document.getElementById('resultSection').classList.remove('visible');

  try {
    const response = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash-exp:generateContent?key=${API_KEY}`,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{
            parts: [
              { text: prompt + ' Сохрани реалистичность. Выходное изображение в горизонтальном формате 16:9.' },
              { inline_data: { mime_type: 'image/jpeg', data: photoBase64 } }
            ]
          }],
          generationConfig: { responseModalities: ['IMAGE', 'TEXT'] }
        })
      }
    );

    const data = await response.json();

    if (!response.ok) {
      throw new Error(data.error?.message || 'Ошибка API');
    }

    // Find image in response
    let imgData = null;
    for (const part of data.candidates?.[0]?.content?.parts || []) {
      if (part.inline_data?.mime_type?.startsWith('image/')) {
        imgData = part.inline_data.data;
        break;
      }
    }

    if (!imgData) {
      throw new Error('Изображение не получено. Попробуй другое фото или описание.');
    }

    resultDataUrl = `data:image/png;base64,${imgData}`;
    document.getElementById('resultImg').src = resultDataUrl;
    document.getElementById('loading').classList.remove('visible');
    document.getElementById('resultSection').classList.add('visible');

  } catch (err) {
    document.getElementById('loading').classList.remove('visible');
    document.getElementById('mainForm').style.display = 'block';
    showError('Ошибка: ' + err.message);
  }
}

function downloadImg() {
  if (!resultDataUrl) return;
  const a = document.createElement('a');
  a.href = resultDataUrl;
  a.download = 'sh-stylist-haircut.png';
  a.click();
}

function resetForm() {
  document.getElementById('resultSection').classList.remove('visible');
  document.getElementById('mainForm').style.display = 'block';
  document.getElementById('errorMsg').classList.remove('visible');
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.classList.add('visible');
}
function hideError() {
  document.getElementById('errorMsg').classList.remove('visible');
}
</script>
</body>
</html>
