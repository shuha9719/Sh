<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Syncopate:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{min-height:100%;background:#06080f;color:#fff;font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;}
.topbar{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;justify-content:space-between;align-items:center;
  padding:13px 18px;background:rgba(6,8,15,0.92);border-bottom:1px solid rgba(255,255,255,0.08);
  backdrop-filter:blur(16px);}
.logo{font-family:'Syncopate';font-weight:700;font-size:12px;letter-spacing:0.2em;}
.back-btn{font-size:11px;letter-spacing:0.1em;text-transform:uppercase;padding:7px 14px;
  border-radius:16px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);
  color:rgba(255,255,255,0.6);text-decoration:none;}
.main{padding:76px 16px 40px;}
.step{display:none;}
.step.active{display:block;}
.step-label{font-size:9px;letter-spacing:0.25em;text-transform:uppercase;color:rgba(255,255,255,0.3);margin-bottom:6px;}
.step-title{font-size:22px;font-weight:600;margin-bottom:20px;line-height:1.3;}
.progress{display:flex;gap:6px;margin-bottom:28px;}
.progress-dot{height:3px;border-radius:2px;flex:1;background:rgba(255,255,255,0.1);transition:background .3s;}
.progress-dot.done{background:rgba(255,255,255,0.8);}
.options{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:24px;}
.option{padding:16px 12px;border-radius:18px;border:2px solid rgba(255,255,255,0.08);
  background:rgba(255,255,255,0.03);cursor:pointer;text-align:center;transition:all .2s;
  -webkit-tap-highlight-color:transparent;user-select:none;}
.option.selected{border-color:rgba(255,255,255,0.5);background:rgba(255,255,255,0.1);}
.option-icon{font-size:32px;margin-bottom:8px;}
.option-name{font-size:13px;font-weight:600;}
.option-desc{font-size:11px;color:rgba(255,255,255,0.4);margin-top:3px;line-height:1.4;}
.next-btn{width:100%;padding:16px;border-radius:18px;border:none;cursor:pointer;
  font-family:'Inter';font-size:14px;font-weight:600;letter-spacing:0.05em;text-transform:uppercase;
  background:linear-gradient(135deg,rgba(255,255,255,0.18),rgba(255,255,255,0.06));
  border:1px solid rgba(255,255,255,0.25);color:#fff;
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.2);transition:all .2s;}
.next-btn:disabled{opacity:0.3;cursor:not-allowed;}
.result-header{background:linear-gradient(135deg,rgba(255,255,255,0.1),rgba(255,255,255,0.03));
  border:1px solid rgba(255,255,255,0.15);border-radius:20px;padding:20px;margin-bottom:16px;}
.result-header .rl{font-size:9px;letter-spacing:0.25em;text-transform:uppercase;color:rgba(255,255,255,0.3);margin-bottom:8px;}
.result-params{display:flex;gap:8px;margin-bottom:12px;}
.result-param{background:rgba(255,255,255,0.06);border-radius:12px;padding:8px 10px;flex:1;text-align:center;}
.result-param .rn{font-size:9px;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.35);margin-bottom:3px;}
.result-param .rv{font-size:11px;font-weight:600;}
.result-tip{font-size:13px;color:rgba(255,255,255,0.6);line-height:1.6;}
.cuts-label{font-size:9px;letter-spacing:0.25em;text-transform:uppercase;color:rgba(255,255,255,0.3);margin-bottom:12px;}
.cut-card{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);
  border-radius:18px;overflow:hidden;margin-bottom:12px;padding:16px;}
.cut-top{display:flex;align-items:center;gap:12px;margin-bottom:10px;}
.cut-num{width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:600;flex-shrink:0;}
.cut-name{font-size:16px;font-weight:600;}
.cut-name-en{font-size:12px;color:rgba(255,255,255,0.4);margin-top:2px;}
.cut-why{font-size:12px;color:rgba(255,255,255,0.55);line-height:1.6;margin-bottom:12px;}
.cut-photos{display:grid;grid-template-columns:repeat(3,1fr);gap:3px;border-radius:12px;overflow:hidden;}
.cut-photo{aspect-ratio:1;overflow:hidden;background:rgba(255,255,255,0.04);position:relative;}
.cut-photo img{width:100%;height:100%;object-fit:cover;}
.cut-photo .ph{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:18px;color:rgba(255,255,255,0.15);}
.restart-btn{width:100%;padding:14px;border-radius:16px;border:1px solid rgba(255,255,255,0.12);
  background:rgba(255,255,255,0.04);color:rgba(255,255,255,0.5);font-family:'Inter';
  font-size:13px;cursor:pointer;margin-bottom:16px;margin-top:4px;}
.book-cta{background:linear-gradient(135deg,rgba(255,255,255,0.12),rgba(255,255,255,0.04));
  border:1px solid rgba(255,255,255,0.2);border-radius:20px;padding:20px;text-align:center;}
.book-cta .bt{font-size:15px;font-weight:600;margin-bottom:6px;}
.book-cta .bs{font-size:12px;color:rgba(255,255,255,0.45);margin-bottom:16px;}
.book-cta .bb{display:inline-block;padding:13px 32px;border-radius:20px;
  background:rgba(255,255,255,0.14);border:1px solid rgba(255,255,255,0.28);
  font-size:12px;letter-spacing:0.12em;text-transform:uppercase;color:#fff;font-weight:600;
  text-decoration:none;}
</style>
</head>
<body>

</div>

<script>
const PEXELS_KEY = 'YstCNGN1pvazhgHtPd0z3E1whf7FER7WEnC3koB16hQvib7KbTUUVUyz';

  {val:'medium', icon:'✂️', name:'Средняя', desc:'Универсально и стильно'},

const STYLES = [
  {val:'classic', icon:'👔', name:'Классика', desc:'Строго и элегантно'},
  {val:'modern', icon:'🔥', name:'Современный', desc:'Трендово и модно'},
  {val:'street', icon:'🧢', name:'Уличный', desc:'Дерзко и свободно'},
  {val:'sport', icon:'💪', name:'Спортивный', desc:'Практично и чисто'},
];

const DB = {
  short:{
    classic:[{name:'Классический пробор',en:'classic side part haircut men',why:'Чистые линии подчёркивают правильные пропорции лица.'},{name:'Crew Cut',en:'crew cut men barbershop',why:'Аккуратная короткая стрижка, универсальная для любого случая.'},{name:'Ivy League',en:'ivy league haircut men',why:'Элегантно и строго — идеально для бизнеса.'}],
    modern:[{name:'Textured Crop',en:'textured crop haircut men 2024',why:'Модная текстура сверху с чистыми боками.'},{name:'French Crop',en:'french crop haircut men',why:'Чёлка вперёд — актуальный европейский тренд.'},{name:'Buzz Cut',en:'buzz cut men style',why:'Минималистично и очень чисто.'}],
    street:[{name:'Edgar Cut',en:'edgar cut haircut men',why:'Резкая прямая чёлка — дерзко и узнаваемо.'},{name:'Temp Fade',en:'temp fade haircut men',why:'Чёткие линии у висков создают уличный образ.'},{name:'Modern Mullet',en:'modern mullet haircut men',why:'Смелый выбор для тех кто не боится выделяться.'}],
    sport:[{name:'Military Cut',en:'military haircut men short',why:'Максимально практично, не мешает при активности.'},{name:'Induction Cut',en:'induction cut men',why:'Очень коротко — никакого обслуживания.'},{name:'High & Tight',en:'high and tight haircut men',why:'Спортивный классик — чисто и строго.'}],
  },
  medium:{
    classic:[{name:'Side Part Medium',en:'side part medium length men haircut',why:'Классический пробор средней длины — всегда актуально.'},{name:'Slick Back',en:'slick back haircut men medium',why:'Зачёсанные назад волосы — стильно и строго.'},{name:'Pompadour',en:'pompadour haircut men classic',why:'Объёмный кварта создаёт выразительный силуэт.'}],
    modern:[{name:'Modern Quiff',en:'modern quiff haircut men 2024',why:'Объём спереди с fade боками — топ тренд.'},{name:'Textured Fringe',en:'textured fringe haircut men',why:'Небрежная чёлка с текстурой — модно и легко.'},{name:'Flow Haircut',en:'flow haircut men medium',why:'Свободные волосы назад — непринуждённо и стильно.'}],
    street:[{name:'Two Block',en:'two block haircut men korean',why:'Корейский стиль — длина сверху, чисто по бокам.'},{name:'Curtains',en:'curtains haircut men middle part',why:'Пробор посередине — возврат 90-х в современном исполнении.'},{name:'Wolf Cut',en:'wolf cut men medium',why:'Рваные слои создают объём и характер.'}],
    sport:[{name:'Undercut Sport',en:'undercut men sport haircut',why:'Длина сверху, коротко по бокам — практично.'},{name:'Soccer Player Cut',en:'soccer player haircut men medium',why:'Как у футболистов — стильно и не мешает.'},{name:'Taper Medium',en:'taper fade medium haircut men',why:'Постепенный переход — аккуратно при любой активности.'}],
  },
  fade:{
    classic:[{name:'Low Fade Comb Over',en:'low fade comb over haircut men',why:'Нижний fade с зачёсом — элегантно и современно.'},{name:'Mid Fade Side Part',en:'mid fade side part men',why:'Классический пробор с градиентом по бокам.'},{name:'Taper Fade Classic',en:'taper fade classic men haircut',why:'Плавный переход — чисто и профессионально.'}],
    modern:[{name:'High Fade Textured',en:'high fade textured top men 2024',why:'Высокий fade с текстурированной макушкой — топ тренд.'},{name:'Skin Fade Quiff',en:'skin fade quiff men haircut',why:'Налысо по бокам с объёмом сверху — контрастно и смело.'},{name:'Drop Fade',en:'drop fade haircut men',why:'Fade опускается за ухом — создаёт уникальный силуэт.'}],
    street:[{name:'Bald Fade Design',en:'bald fade with design haircut men',why:'Можно добавить рисунок — максимально уличный стиль.'},{name:'High Top Fade',en:'high top fade men haircut',why:'Высокая плоская макушка с чистыми боками.'},{name:'Mohawk Fade',en:'mohawk fade men haircut',why:'Дорожка посередине с fade — дерзко и смело.'}],
    sport:[{name:'Buzz Fade',en:'buzz fade men haircut',why:'Короткий buzz с градиентом — идеально для спорта.'},{name:'Clean Fade',en:'clean fade men barbershop',why:'Максимально чисто, минимум ухода.'},{name:'Taper Short',en:'taper haircut short men sport',why:'Практично, стильно, не мешает при тренировках.'}],
  },
  long:{
    classic:[{name:'Long Slick Back',en:'long slick back men classic haircut',why:'Длинные волосы назад — элегантно и мощно.'},{name:'Gentleman Long',en:'gentleman long hair men style',why:'Ухоженные длинные волосы — аристократичный образ.'},{name:'Long Side Part',en:'long hair side part men',why:'Классический пробор с длиной — строго и красиво.'}],
    modern:[{name:'Modern Shag',en:'modern shag haircut men long',why:'Рваные слои и текстура — актуальный рок-стиль.'},{name:'Bun Undercut',en:'undercut man bun men haircut',why:'Пучок сверху с undercut боками — модно и практично.'},{name:'Long Wolf Cut',en:'long wolf cut men 2024',why:'Объёмные слои — самый трендовый длинный стиль.'}],
    street:[{name:'Long Curtains',en:'long curtains haircut men',why:'Длинный пробор посередине — свободно и стильно.'},{name:'Surfer Hair',en:'surfer hair men long',why:'Волнистые длинные волосы — пляжный расслабленный стиль.'},{name:'Shaggy Long',en:'shaggy long hair men street',why:'Небрежная длина — уличный свободный образ.'}],
    sport:[{name:'Man Bun',en:'man bun men athletic',why:'Собрать в пучок — практичное решение для спорта.'},{name:'Long Taper',en:'long hair taper men',why:'Длина сверху с чистыми боками — удобно при активности.'},{name:'Half Up',en:'half up half down men long hair',why:'Универсально — можно носить по-разному.'}],
  },
};

const TIPS = {
  oval:'Овальное лицо — идеальная форма для любых стрижек. Тебе подойдёт практически всё — экспериментируй смело.',
  round:'Круглое лицо — добавляй объём сверху и держи бока короткими. Избегай стрижек, расширяющих стороны.',
  square:'Квадратное лицо — мягкие текстурные стрижки смягчат угловатость. Избегай слишком коротких боков.',
  rect:'Прямоугольное лицо — добавляй объём по бокам, держи макушку не слишком высокой.',
  tri:'Треугольное лицо — объём снизу и короткие бока создадут баланс.',
  dia:'Ромбовидное лицо — добавляй объём на макушке и у висков для баланса широких скул.',
};

let face='', faceLabel='', len='', lenLabel='', style='', styleLabel='';

function renderOptions(items, container, step) {
  const el = document.getElementById(container);
  el.innerHTML = items.map(item => `
    <div class="option" id="opt_${step}_${item.val}" onclick="selectOpt('${step}','${item.val}','${item.name}')">
      <div class="option-icon">${item.icon}</div>
      <div class="option-name">${item.name}</div>
      <div class="option-desc">${item.desc}</div>
    </div>
  `).join('');
}

function selectOpt(step, val, label) {
  const allOpts = document.querySelectorAll(`#step${step} .option`);
  allOpts.forEach(o => o.classList.remove('selected'));
  document.getElementById(`opt_${step}_${val}`).classList.add('selected');
  if(step==='1'){ face=val; faceLabel=label; document.getElementById('next1').disabled=false; }
  if(step==='2'){ len=val; lenLabel=label; document.getElementById('next2').disabled=false; }
  if(step==='3'){ style=val; styleLabel=label; document.getElementById('next3').disabled=false; }
}

function goStep(n) {
  document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
  document.getElementById('step'+n).classList.add('active');
  for(let i=1;i<=3;i++) document.getElementById('dot'+i).classList.toggle('done', i<n);
  window.scrollTo(0,0);
}

function showResult() {
  const cuts = DB[len]?.[style] || DB.fade.modern;
  const tip = TIPS[face] || TIPS.oval;

  document.getElementById('rFace').textContent = faceLabel;
  document.getElementById('rLen').textContent = lenLabel;
  document.getElementById('rStyle').textContent = styleLabel;
  document.getElementById('rTip').textContent = tip;

  document.getElementById('cutsContainer').innerHTML = cuts.map((c,i) => `
    <div class="cut-card">
      <div class="cut-top">
        <div class="cut-num">${i+1}</div>
        <div>
          <div class="cut-name">${c.name}</div>
          <div class="cut-name-en">${c.en}</div>
        </div>
      </div>
      <div class="cut-why">${c.why}</div>
      <div class="cut-photos" id="photos-${i}">
        <div class="cut-photo"><div class="ph">⏳</div></div>
        <div class="cut-photo"><div class="ph">⏳</div></div>
        <div class="cut-photo"><div class="ph">⏳</div></div>
      </div>
    </div>
  `).join('');

  document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
  document.getElementById('stepResult').classList.add('active');
  document.querySelectorAll('.progress-dot').forEach(d => d.classList.add('done'));
  window.scrollTo(0,0);

  cuts.forEach((c,i) => loadPhotos(c.en, i));
}

async function loadPhotos(query, idx) {
  const container = document.getElementById('photos-'+idx);
  if(!container) return;
  try {
    const res = await fetch(
      'https://api.pexels.com/v1/search?query='+encodeURIComponent(query)+'&per_page=3&orientation=square',
      { headers: { 'Authorization': PEXELS_KEY } }
    );
    const data = await res.json();
    const photos = data.photos || [];
    if(!photos.length){ container.innerHTML=''; return; }
    container.innerHTML = photos.map(p =>
      '<div class="cut-photo"><img src="'+p.src.medium+'" loading="lazy"></div>'
    ).join('');
  } catch(e) { container.innerHTML=''; }
}

function restart() {
  face=''; len=''; style='';
  faceLabel=''; lenLabel=''; styleLabel='';
  renderOptions(FACES,'opts1','1');
  renderOptions(LENGTHS,'opts2','2');
  renderOptions(STYLES,'opts3','3');
  document.getElementById('next1').disabled=true;
  document.getElementById('next2').disabled=true;
  document.getElementById('next3').disabled=true;
  goStep(1);
}

restart();
</script>
</body>
</html>
